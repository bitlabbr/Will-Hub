<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Controller</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #ecf0f1; margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

    #login-view { display: flex; flex-direction: column; width: 80%; max-width: 300px; }
    input { padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 1.2em; text-align: center; text-transform: uppercase; }
    button { padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 8px; font-size: 1.2em; font-weight: bold; cursor: pointer; }

    #waiting-view { display: none; text-align: center; padding: 20px; font-size: 1.5em; color: #7f8c8d; }
    #controller-container { display: none; width: 100%; height: 100%; background: #2c3e50; }
  </style>
</head>
<body>

<div id="login-view">
  <h2>Entrar no Console</h2>
  <input type="text" id="room-code" placeholder="CÓDIGO (ex: ABCD)" maxlength="4">
  <input type="text" id="player-name" placeholder="Seu Nome">
  <button id="join-btn">CONECTAR</button>
</div>

<div id="waiting-view">
  <h2>Conectado!</h2>
  <p>Olhe para a TV.</p>
  <p style="font-size: 0.6em;">Aguardando o Host escolher um jogo...</p>
</div>

<div id="controller-container"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="client-core.js"></script>
</body>
</html>
