<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Hub - TV</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #1a1a2e; color: white; text-align: center; margin: 0; overflow: hidden; }

        /* Telas (Views) */
        #start-screen { position: absolute; width: 100vw; height: 100vh; background: #16213e; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #lobby-view { padding: 40px; display: none; }
        #game-container { display: none; width: 100vw; height: 100vh; background: #0f3460; }

        /* Estilos do Lobby */
        #room-code-display { font-size: 5em; color: #e94560; letter-spacing: 10px; font-weight: bold; margin: 20px 0; }
        #players-list { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; list-style: none; padding: 0; }
        .player-card { background: #0f3460; padding: 15px 30px; border-radius: 8px; font-size: 1.5em; }

        /* Catálogo de Jogos */
        .games-catalog { margin-top: 50px; display: flex; justify-content: center; gap: 20px; }
        .game-card { background: #e94560; padding: 20px; border-radius: 10px; cursor: pointer; font-size: 1.5em; font-weight: bold; transition: transform 0.2s; }
        .game-card:hover { transform: scale(1.1); }

        button { padding: 15px 30px; font-size: 1.5em; cursor: pointer; background: #e94560; color: white; border: none; border-radius: 8px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div id="start-screen">
    <h1>Seu Novo Console Web</h1>
    <button id="start-btn">Ligar Console</button>
</div>

<audio id="bg-music" src="will-hub-loby-soundtrack.mp3" loop></audio>

<div id="lobby-view">
    <div style="display: flex; justify-content: center; align-items: center; gap: 50px; margin: 20px 0; background: rgba(0,0,0,0.3); padding: 30px; border-radius: 15px;">
        <div style="text-align: left;">
            <h2>Acesse no celular:</h2>
            <h3 id="join-url" style="color: #a2a8d3; margin: 10px 0;">Calculando IP...</h3>
            <h2 style="margin-top: 20px;">CÓDIGO DA SALA:</h2>
            <div id="room-code-display" style="font-size: 5em; color: #e94560; letter-spacing: 10px; font-weight: bold; margin: 0;">----</div>
        </div>

        <div id="qrcode-container" style="background: white; padding: 15px; border-radius: 10px;"></div>
    </div>

    <h3>Jogadores Conectados (<span id="player-count">0</span>)</h3>
    <ul id="players-list"></ul>

    <div class="games-catalog">
        <div class="game-card" data-game-id="FrameGame">🃏 FrameGame</div>
    </div>
</div>

<div id="game-container"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="host-core.js"></script>
</body>
</html>
