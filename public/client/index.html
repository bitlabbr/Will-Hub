<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Controller - Client</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ecf0f1; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
    #login-view, #controller-view { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 300px; }
    #controller-view { display: none; height: 100%; justify-content: center; }
    input { padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #bdc3c7; width: 100%; font-size: 1.2em; text-align: center; text-transform: uppercase; }
    button.btn-join { background: #2ecc71; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 1.2em; font-weight: bold; margin-top: 10px; cursor: pointer; }

    /* O Botão Gigante do Jogo */
    button.btn-action { background: #e74c3c; color: white; border: none; width: 200px; height: 200px; border-radius: 50%; font-size: 2em; font-weight: bold; box-shadow: 0 10px 0 #c0392b; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
    button.btn-action:active { transform: translateY(10px); box-shadow: 0 0 0 #c0392b; }
  </style>
</head>
<body>

<div id="login-view">
  <h2>Entrar na Sala</h2>
  <input type="text" id="room-code-input" placeholder="CÓDIGO (ex: ABCD)" maxlength="4">
  <input type="text" id="player-name-input" placeholder="Seu Nome">
  <button class="btn-join" id="join-btn">JOGAR!</button>
</div>

<div id="controller-view">
  <button class="btn-action" id="action-btn">BATER!</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

  const loginView = document.getElementById('login-view');
  const controllerView = document.getElementById('controller-view');
  const roomCodeInput = document.getElementById('room-code-input');
  const playerNameInput = document.getElementById('player-name-input');
  const joinBtn = document.getElementById('join-btn');
  const actionBtn = document.getElementById('action-btn');

  joinBtn.addEventListener('click', () => {
    const roomCode = roomCodeInput.value.trim();
    const playerName = playerNameInput.value.trim();

    if (roomCode.length !== 4 || playerName.length === 0) {
      alert("Preencha o código de 4 letras e o seu nome.");
      return;
    }

    // Envia pedido de entrada na sala
    socket.emit('joinRoom', { roomCode, playerName });
  });

  // Sucesso ao entrar
  socket.on('joinSuccess', () => {
    loginView.style.display = 'none';
    controllerView.style.display = 'flex';
  });

  // Erro ao entrar
  socket.on('joinError', (message) => {
    alert(message);
  });

  // Envio de evento do controle para a TV
  // Usamos touchstart para menor latência em celulares, com fallback para mousedown
  const triggerAction = (e) => {
    e.preventDefault(); // Evita double-firing em alguns browsers mobile
    socket.emit('playerAction', 'BOTAO_PRESSIONADO');
    // Feedback tátil se o celular suportar
    if (navigator.vibrate) navigator.vibrate(50);
  };

  actionBtn.addEventListener('touchstart', triggerAction);
  actionBtn.addEventListener('mousedown', triggerAction);
</script>
</body>
</html>
