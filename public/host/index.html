<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Screen - Host</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c3e50; color: white; text-align: center; padding: 50px; }
        #room-code-display { font-size: 4em; letter-spacing: 5px; color: #f1c40f; margin: 20px 0; font-weight: bold; }
        #players-list { list-style: none; padding: 0; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .player-card { background: #34495e; padding: 15px 30px; border-radius: 10px; font-size: 1.2em; transition: transform 0.1s; }
        .active-action { transform: scale(1.2); background: #e74c3c; }
        #log { margin-top: 40px; color: #bdc3c7; font-family: monospace; }
    </style>
</head>
<body>
<h1>Junte-se ao jogo!</h1>
<p>Acesse pelo celular e digite o código:</p>
<div id="room-code-display">CARREGANDO...</div>

<h2>Jogadores (<span id="player-count">0</span>)</h2>
<ul id="players-list"></ul>

<div id="log">Aguardando ações...</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const roomCodeDisplay = document.getElementById('room-code-display');
    const playersList = document.getElementById('players-list');
    const playerCount = document.getElementById('player-count');
    const logDisplay = document.getElementById('log');

    let players = {};

    // Solicita a criação da sala assim que conecta
    socket.emit('createRoom');

    // Recebe o código gerado pelo servidor
    socket.on('roomCreated', (code) => {
        roomCodeDisplay.innerText = code;
    });

    // Um jogador entrou na sala
    socket.on('playerJoined', (player) => {
        players[player.id] = player.name;
        playerCount.innerText = Object.keys(players).length;

        const li = document.createElement('li');
        li.id = `player-${player.id}`;
        li.className = 'player-card';
        li.innerText = player.name;
        playersList.appendChild(li);
    });

    // Uma ação foi recebida do celular
    socket.on('actionReceived', (data) => {
        logDisplay.innerText = `Última ação: ${data.playerName} enviou "${data.action}"`;

        // Animação visual simples no card do jogador
        const playerCard = document.getElementById(`player-${data.playerId}`);
        if (playerCard) {
            playerCard.classList.add('active-action');
            setTimeout(() => playerCard.classList.remove('active-action'), 200);
        }
    });

    socket.on('playerLeft', (data) => {
        // Remove do nosso controle interno
        delete players[data.playerId];
        playerCount.innerText = Object.keys(players).length;

        // Remove o elemento visual da tela
        const playerCard = document.getElementById(`player-${data.playerId}`);
        if (playerCard) {
            playerCard.remove();
        }

        logDisplay.innerText = `Aviso: ${data.playerName} saiu do jogo.`;
    });
</script>
</body>
</html>
